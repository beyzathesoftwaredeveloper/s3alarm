---
- name: Check S3 bucket usage and send alarm if threshold exceeded
  hosts: localhost
  gather_facts: false

  vars:
    bucket_name: "my-bucket"
    s3_endpoint: "https://s3.example.internal"
    s3_access_key: "{{ lookup('env', 'S3_ACCESS_KEY') }}"
    s3_secret_key: "{{ lookup('env', 'S3_SECRET_KEY') }}"
    aws_region: "us-east-1"
    bucket_quota_bytes: "1099511627776"

    smtp_host: "smtp.example.com"
    smtp_port: "587"
    smtp_username: ""
    smtp_password: ""
    smtp_use_tls: "true"

    mail_from: "alerts@example.com"
    mail_to: "ops@example.com"

    s3_threshold_percent: "80"
    alarm_cooldown_minutes: "30"
    alarm_state_path: "/tmp/.alarm_state/state.json"

    alarm_script_url: "https://raw.githubusercontent.com/beyzathesoftwaredeveloper/s3alarm/main/alarm.py"
    alarm_script_path: "/tmp/alarm.py"

  tasks:

    - name: Download alarm script from GitHub
      ansible.builtin.get_url:
        url: "{{ alarm_script_url }}"
        dest: "{{ alarm_script_path }}"
        mode: "0755"

    - name: Run bucket alarm script
      ansible.builtin.command: python3 "{{ alarm_script_path }}"
      environment:
        S3_BUCKET_NAME: "{{ bucket_name }}"
        S3_ENDPOINT_URL: "{{ s3_endpoint }}"
        S3_ACCESS_KEY: "{{ s3_access_key }}"
        S3_SECRET_KEY: "{{ s3_secret_key }}"
        AWS_REGION: "{{ aws_region }}"
        S3_BUCKET_QUOTA_BYTES: "{{ bucket_quota_bytes }}"

        SMTP_HOST: "{{ smtp_host }}"
        SMTP_PORT: "{{ smtp_port }}"
        SMTP_USERNAME: "{{ smtp_username }}"
        SMTP_PASSWORD: "{{ smtp_password }}"
        SMTP_USE_TLS: "{{ smtp_use_tls }}"
        MAIL_FROM: "{{ mail_from }}"
        MAIL_TO: "{{ mail_to }}"

        S3_THRESHOLD_PERCENT: "{{ s3_threshold_percent }}"
        ALARM_COOLDOWN_MINUTES: "{{ alarm_cooldown_minutes }}"
        ALARM_STATE_PATH: "{{ alarm_state_path }}"
      register: alarm_result
      changed_when: false

    - name: Show script stdout
      ansible.builtin.debug:
        var: alarm_result.stdout_lines

    - name: Show script stderr if exists
      ansible.builtin.debug:
        var: alarm_result.stderr_lines
      when: alarm_result.stderr is defined and alarm_result.stderr | length > 0
